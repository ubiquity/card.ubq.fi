name: Run unit tests for pages functions
on:
  workflow_dispatch:
  pull_request:
  push:

env:
  NODE_ENV: "test"

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: HUSKY=0 bun install --frozen-lockfile --registry=https://registry.npmjs.org

      - name: Run tests
        run: bunx vitest --run
