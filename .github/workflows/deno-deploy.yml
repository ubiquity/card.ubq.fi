name: Deno Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@main
    with:
      project: card-ubq-fi
      entrypoint: serve.ts
      bun_version: 1.3.4
      install_command: HUSKY=0 bun install --registry=https://registry.npmjs.org
      build_command: bun run build
      build_env: |
        SUPABASE_URL=$SUPABASE_URL
        SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
        BACKEND_URL=https://pay.ubq.fi
        FRONTEND_URL=https://card.ubq.fi
      runtime_env: |
        STATIC_DIR=static
      include: |
        static/**
      debug_fetch_fail: true
      required_env: |
        DENO_DEPLOY_TOKEN
        SUPABASE_URL
        SUPABASE_ANON_KEY
    secrets: inherit
