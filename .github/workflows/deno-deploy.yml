name: Deno Deploy

on:
  push:
    branches-ignore:
      - dist/**
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@codex
    with:
      project: card-ubq-fi
      deploy_platform: deno2
      entrypoint: serve.ts
      install_command: deno install
      build_command: deno task build
      build_env: |
        SUPABASE_URL=$SUPABASE_URL
        SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
        BACKEND_URL=https://pay.ubq.fi
        FRONTEND_URL=https://card.ubq.fi
      runtime_env: |
        STATIC_DIR=static
      include: |
        static/**
      index_html_path: static/index.html
      extra_paths: |
        /smoke/path
        /ubiquity-dollar.html
      debug_fetch_fail: true
      required_env: |
        DENO_DEPLOY_TOKEN
        SUPABASE_URL
        SUPABASE_ANON_KEY
    secrets: inherit
